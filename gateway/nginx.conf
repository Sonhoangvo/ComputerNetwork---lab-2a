events {}

http {
    upstream backend_pool {
        server backend-a:3000;
        server backend-b:3000;
    }

    server {
        listen 80;
        server_name app.groupx.lab;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name app.groupx.lab;

        ssl_certificate     /certs/gateway.crt;
        ssl_certificate_key /certs/gateway.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass https://backend_pool;
            proxy_ssl_server_name on;
            proxy_ssl_name backend_pool;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /certs/ca.crt;
            proxy_ssl_verify_depth 2;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
